[project]
name = "libsparseir"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.2.4",
    "cffi>=1.17.1",
]

[dependency-groups]
dev = [
    "clang==17.*",
    "ctypeslib2>=2.4.0",
    "ipython>=9.1.0",
    "pytest>=8.3.5",
    "ruff>=0.11.6",
    "setuptools>=79.0.0",
]

[build-system]
requires = ["hatchling", "cffi>=1.17.1"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/libsparseir"]
