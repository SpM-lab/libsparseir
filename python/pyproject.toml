[project]
name = "libsparseir"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.2.4",
]

[dependency-groups]
dev = [
    "ipython>=9.1.0",
    "jupyterlab>=4.4.0",
    "jupytext>=1.17.0",
    "pytest>=8.3.5",
    "ruff>=0.11.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/libsparseir"]
