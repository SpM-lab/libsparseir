[project]
name = "libsparseir"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.2.4",
]

[dependency-groups]
dev = [
    "ipython>=9.1.0",
    "jupyterlab>=4.4.0",
    "jupytext>=1.17.0",
    "pytest>=8.3.5",
    "ruff>=0.11.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/libsparseir"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP", "PL", "RUF"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["libsparseir"]
known-third-party = ["numpy", "pytest", "ctypes"]
combine-as-imports = true
force-single-line = false
force-sort-within-sections = true
order-by-type = true
split-on-trailing-comma = true
